<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akuzipik Wordbuilder</title>
    <link href="CSS/style.css" rel="stylesheet" type="text/css">
    <!--Icon set created by Lane Schwartz (lanes@illinois.edu)-->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="manifest" href="manifest.json">
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#50b5c2">
    <meta name="msapplication-TileColor" content="#b0e0e6">
    <meta name="theme-color" content="#b0e0e6">
</head>
<body>
  <div>
    <h3>Akuzipik Wordbuilder</h3>
    <select name="det" id="det">
      <option>the</option>
      <option>my</option>
      <option>your</option>
      <option>his/her/its</option>
    </select>
    <select name="num" id="num_select">
      <option>one</option>
      <option>two</option>
      <option>3+</option>
    </select>
    <select name="base" id="base_select">
      <option>person</option>
      <option>dog</option>
      <option>knife</option>
      <option>boat</option>
    </select>
  </div>
</body>
</html>
