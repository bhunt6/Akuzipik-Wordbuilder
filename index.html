<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akuzipik Wordbuilder</title>
    <link href="CSS/style.css" rel="stylesheet" type="text/css">
    <!--Icon set created by Lane Schwartz (lanes@illinois.edu)-->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="manifest" href="manifest.json">
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#50b5c2">
    <meta name="msapplication-TileColor" content="#b0e0e6">
    <meta name="theme-color" content="#b0e0e6">
</head>
<body>
  <div class="centered-box">
    <h1>Akuzipik Wordbuilder</h1>
    <div id="phraseTypeChoices">
      <div class="radioGroup">
        <input type="radio" id="np" name="phraseType" value="NP" class="radio">
        <label for="np">Build a Noun Phrase</label><br>
      </div>
      <div class="radioGroup">
        <input type="radio" id="vp" name="phraseType" value="VP" class="radio">
        <label for="vp">Build a Verb Phrase</label><br>
      </div>
      <div class="radioGroup">
        <input type="radio" id="qp" name="phraseType" value="QP" class="radio">
        <label for="qp">Ask a Question</label><br>
      </div>
      <div class="radioGroup">
        <input type="radio" id="cp" name="phraseType" value="CP" class="radio">
        <label for="cp">Give a Command</label><br>
      </div>
    </div>
    <div id="builderContainer" class="builderContainer">
      <div id="output" class="output"></div>
    </div>
    <div id="dropdownContainer">
      <div id="verbDropdowns" class="dropdownSet" style="display:none;">
        <select name="verb" id="vPerNumSelect" class="dropdown"></select>
        <select name="verb" id="vBaseSelect" class="dropdown"></select>
      </div>
      <div id="nounDropdowns" class="dropdownSet" style="display: none;">
        <select name="noun" id="nCaseSelect" class="dropdown"></select>
        <select name="noun" id="nDetSelect" class="dropdown"></select>
        <select name="noun" id="nNumSelect" class="dropdown"></select>
        <select name="noun" id="nBaseSelect" class="dropdown"></select>
      </div>
    </div>
    <div id="buttonContainer">
      <button id="buildButton" onclick="testWordBuilder()"style="display: none;">Build Phrase</button>
    </div>
  </div>
  <script src="JS/dropdowns.js"></script>
  <script src="JS/builder.js"></script>
  <script src="JS/m2s.js"></script>
  <script src="JS/foma_apply_down.js"></script>
</body>
</html>
