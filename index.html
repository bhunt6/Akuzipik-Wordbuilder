<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akuzipik Wordbuilder</title>
    <link href="CSS/style.css" rel="stylesheet" type="text/css">
    <!--Icon set created by Lane Schwartz (lanes@illinois.edu)-->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="manifest" href="manifest.json">
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#50b5c2">
    <meta name="msapplication-TileColor" content="#b0e0e6">
    <meta name="theme-color" content="#b0e0e6">
</head>
<body>
  <div>
    <h1>Akuzipik Wordbuilder</h1>
    <div id="phraseTypeChoices">
      <input type="radio" id="np" name="phraseType" value="NP">
      <label for="np">Build a Noun Phrase</label><br>
      <input type="radio" id="vp" name="phraseType" value="VP">
      <label for="vp">Build a Verb Phrase</label><br>
      <input type="radio" id="qp" name="phraseType" value="QP">
      <label for="qp">Ask a Question</label><br>
      <input type="radio" id="cp" name="phraseType" value="CP">
      <label for="cp">Give a Command</label><br>
    </div>
    <div id="builderContainer">
      <div id="output">Akuzipik Phrase goes here</div>
    </div>
    <div id="dropdownContainer">
      <div id="verbDropdowns" class="dropdowns" style="display:none;">
        <select name="verb" id="vPerNumSelect"></select>
        <select name="verb" id="vBaseSelect"></select>
      </div>
      <div id="nounDropdowns" class="dropdowns" style="display: block;">
        <select name="noun" id="nCaseSelect"></select>
        <select name="noun" id="nDetSelect"></select>
        <select name="noun" id="nNumSelect"></select>
        <select name="noun" id="nBaseSelect"></select>
      </div>
    </div>
    <div id="buttonContainer">
      <button onclick="testWordBuilder()">Build Phrase</button>
    </div>
  </div>
  <script src="dropdowns.js"></script>
  <script src="builder.js"></script>
</body>
</html>
